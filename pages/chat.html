<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRFA.MA - المحادثات</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-app-container {
            display: flex;
            height: calc(100vh - 80px);
            margin-top: 80px;
            overflow: hidden;
            background: var(--color-bg);
        }

        .contacts-sidebar {
            width: 350px;
            border-left: 4px solid var(--color-primary);
            display: flex;
            flex-direction: column;
            background: var(--color-white);
            transition: transform 0.3s ease;
        }

        .contacts-header {
            padding: 25px;
            border-bottom: 4px solid var(--color-primary);
        }

        .contacts-header h2 {
            color: var(--color-primary);
            font-weight: 800;
            font-size: 1.8rem;
        }

        .search-box {
            position: relative;
            margin-top: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: var(--color-white);
            border: 2px solid var(--color-primary);
            border-radius: 0;
            color: var(--color-dark);
            font-weight: 800;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-primary);
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-card {
            display: flex;
            padding: 20px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 2px solid var(--color-primary);
            background: var(--color-white);
        }

        .contact-card:hover {
            background: var(--color-bg);
            opacity: 0.8;
        }

        .contact-card.active {
            background: rgba(var(--color-accent-rgb), 0.05);
            border-right: 6px solid var(--color-accent);
        }

        .contact-avatar {
            width: 55px;
            height: 55px;
            border-radius: 0;
            background: var(--color-accent);
            border: 2px solid var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            margin-left: 20px;
            position: relative;
            font-size: 1.2rem;
        }

        .online-indicator {
            width: 14px;
            height: 14px;
            background: var(--color-success);
            border: 2px solid var(--color-primary);
            border-radius: 0;
            position: absolute;
            bottom: -2px;
            right: -2px;
        }

        .contact-info {
            flex: 1;
            overflow: hidden;
        }

        .contact-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .contact-name {
            font-weight: 800;
            color: var(--color-primary);
            font-size: 1.1rem;
        }

        .contact-time {
            font-size: 0.85rem;
            color: var(--color-slate);
            font-weight: 800;
        }

        .contact-last-msg {
            font-size: 0.95rem;
            color: var(--color-slate);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 800;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--color-bg);
        }

        .chat-header {
            padding: 20px 30px;
            background: var(--color-white);
            border-bottom: 4px solid var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            color: var(--color-primary);
            font-weight: 800;
            font-size: 1.5rem;
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: var(--color-bg);
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.sent {
            justify-content: flex-start;
        }

        .message-row.received {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 0;
            position: relative;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 800;
            border: 2px solid var(--color-primary);
        }

        .sent .message-bubble {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .received .message-bubble {
            background: var(--color-white);
            color: var(--color-primary);
        }

        .msg-time {
            display: block;
            font-size: 0.8rem;
            margin-top: 8px;
            opacity: 0.8;
            text-align: left;
        }

        .chat-input-area {
            padding: 25px 30px;
            background: var(--color-white);
            border-top: 4px solid var(--color-primary);
        }

        .input-group {
            display: flex;
            gap: 15px;
            background: var(--color-white);
            padding: 8px;
            border-radius: 0;
            border: 2px solid var(--color-primary);
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: var(--color-dark);
            font-weight: 800;
            outline: none;
            font-size: 1.1rem;
        }

        .btn-icon {
            background: var(--color-white);
            border: 2px solid var(--color-primary);
            color: var(--color-primary);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .chat-input-area .btn-accent {
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 0;
            width: 60px;
            height: 45px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input-area .btn-accent:hover {
            filter: brightness(1.1);
        }

        .typing span {
            animation: blink 1s infinite;
            margin: 0 2px;
        }

        @keyframes blink {
            0% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
            }
        }

        @media (max-width: 768px) {
            .contacts-sidebar {
                position: absolute;
                right: 0;
                top: 60px;
                height: calc(100vh - 60px);
                width: 100%;
                z-index: 10;
                transform: translateX(0);
            }

            .chat-container.chat-open .contacts-sidebar {
                transform: translateX(100%);
            }

            .back-btn {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="chat-app-container chat-container">
        <!-- Sidebar -->
        <aside class="contacts-sidebar">
            <div class="contacts-header">
                <h2 data-i18n="chat_title">المحادثات</h2>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="البحث عن محادثة..."
                        data-i18n-placeholder="search_chats_placeholder">
                </div>
            </div>
            <div class="contacts-list" id="contacts-list">
                <!-- Contacts will be loaded here by chat.js -->
            </div>
        </aside>

        <!-- Main Chat Pane -->
        <main class="chat-main">
            <header class="chat-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="btn-icon back-btn"
                        onclick="document.querySelector('.chat-container').classList.remove('chat-open')"
                        style="display: none;">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <div class="active-chat-info">
                        <h3 id="chat-with-name">اختر محادثة</h3>
                        <p id="chat-with-status" style="font-size: 0.8rem; opacity: 0.6;"></p>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="btn-icon"><i class="fas fa-phone"></i></button>
                    <button class="btn-icon"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="empty-state" style="margin: auto; text-align: center; opacity: 0.5;">
                    <i class="fas fa-comments" style="font-size: 4rem; margin-bottom: 20px;"></i>
                    <p data-i18n="no_chats">محتاج تهضر مع شي واحد؟ كليكي على شي محادثة.</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-group">
                    <button class="btn-icon"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="msg-input" placeholder="اكتب رسالة..." data-i18n-placeholder="type_message">
                    <button class="btn btn-accent" id="send-btn" style="border-radius: 0; padding: 8px 20px;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- JS Files -->
    <script src="../js/i18n.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/ui.js"></script>
    <script type="module" src="../js/chat.js"></script>
</body>

</html>
