<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | HRFA.MA</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .jobs-container {
            margin-top: 20px;
        }

        .tab-group {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 0;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--color-primary);
            padding: 12px 25px;
            cursor: pointer;
            font-weight: 800;
            transition: var(--transition-smooth);
            position: relative;
            font-size: 1.1rem;
        }

        .tab-btn.active {
            color: var(--color-white);
            background: var(--color-primary);
        }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .job-card {
            background: var(--color-white);
            border: 2px solid var(--color-primary);
            padding: 25px;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .job-card:hover {
            border-color: var(--color-accent);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 0;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-progress {
            background: #dcfce7;
            color: #166534;
        }

        .status-completed {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .job-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            border-top: 2px solid var(--color-primary);
            padding-top: 20px;
        }

        .rating-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(var(--color-primary-rgb), 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }

        .rating-modal {
            background: var(--color-white);
            border: 4px solid var(--color-primary);
            padding: 40px;
            border-radius: 0;
            width: 450px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>
    <div id="bottom-nav-placeholder"></div>

    <main class="container" style="padding-top: 120px; padding-bottom: 60px;">
        <header style="margin-bottom: 40px;">
            <h1 data-i18n="jobs_title"
                style="margin-bottom: 12px; font-weight: 800; color: var(--color-primary); font-size: 2.5rem;">طلباتي
            </h1>
            <p style="color: var(--color-slate); font-weight: 800; font-size: 1.1rem;">تتبع جميع طلبات الخدمة ديالك فهاد
                الصفحة.</p>
        </header>

        <section class="jobs-container">
            <div class="tab-group">
                <button class="tab-btn active" data-tab="active" data-i18n="active_jobs">طلبات جارية</button>
                <button class="tab-btn" data-tab="history" data-i18n="history_jobs">الأرشيف</button>
            </div>

            <div id="job-list" class="job-grid">
                <!-- Jobs will be rendered here via JS -->
                <div style="padding: 50px; text-align: center; grid-column: 1/-1; color: var(--color-primary);">
                    <i class="fas fa-spinner fa-spin fa-3x"></i>
                </div>
            </div>
        </section>
    </main>

    <!-- Rating Modal -->
    <div class="rating-overlay" id="rating-modal">
        <div class="rating-modal">
            <h3 style="margin-bottom: 25px; font-weight: 800; color: var(--color-primary); font-size: 1.8rem;">قيم
                الخدمة</h3>
            <div class="rating-stars" id="star-picker"
                style="display: flex; justify-content: center; font-size: 2.5rem; margin-bottom: 30px; color: var(--color-accent); cursor: pointer;">
                <i class="far fa-star" data-val="1"></i>
                <i class="far fa-star" data-val="2"></i>
                <i class="far fa-star" data-val="3"></i>
                <i class="far fa-star" data-val="4"></i>
                <i class="far fa-star" data-val="5"></i>
            </div>
            <textarea id="rating-comment" class="auth-input" placeholder="شنو بان ليك فالخدمة؟"
                style="width: 100%; height: 120px; margin-bottom: 30px; border: 2px solid var(--color-primary); border-radius: 0; padding: 15px; font-weight: 800; font-size: 1rem;"></textarea>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-outline"
                    style="flex: 1; border-radius: 0; border: 2px solid var(--color-primary); color: var(--color-primary); font-weight: 800; padding: 12px;"
                    onclick="closeRating()">إلغاء</button>
                <button class="btn btn-primary"
                    style="flex: 1; border-radius: 0; background: var(--color-accent); color: white; border: none; font-weight: 800; padding: 12px;"
                    onclick="submitRating()">إرسال</button>
            </div>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/jobs.js"></script>
</body>

</html>
