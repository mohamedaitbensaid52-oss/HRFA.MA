<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من نحن - HRFA.MA</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="container" style="padding: 120px 20px 60px;">
        <div class="flat-card"
            style="padding: 60px; border: 2px solid var(--color-primary); background: var(--color-white); margin-bottom: 40px;">
            <h1 data-i18n="nav_about" style="font-size: 3rem; margin-bottom: 30px; color: var(--color-primary);">من نحن
            </h1>
            <p style="font-size: 1.2rem; line-height: 1.8; color: var(--color-slate); max-width: 800px;">
                HRFA.MA هي المنصة المغربية الرائدة اللي كاتجمع بين أمهر الحرفيين والزبناء فكاع مدن المملكة. هدفنا هو
                نسهلو عملية البحث على خدمات منزلية موثوقة ونعاونو الحرفيين يبنيو السمعة ديالهم ويخدمو كتر.
            </p>
            <div class="stat-grid" style="margin-top: 50px;">
                <div class="stat-card">
                    <div class="icon-box"><i class="fas fa-users"></i></div>
                    <h3>+10,000</h3>
                    <p data-i18n="about_stat_users">مستخدم نشيط</p>
                </div>
                <div class="stat-card">
                    <div class="icon-box"><i class="fas fa-user-tie"></i></div>
                    <h3>+2,000</h3>
                    <p data-i18n="about_stat_artisans">حرفي موثق</p>
                </div>
                <div class="stat-card">
                    <div class="icon-box"><i class="fas fa-map-marked-alt"></i></div>
                    <h3>+50</h3>
                    <p data-i18n="about_stat_cities">مدينة مغربية</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>

</html>
