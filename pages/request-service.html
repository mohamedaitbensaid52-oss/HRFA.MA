<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRFA.MA - طلب خدمة جديذة</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="background: var(--color-bg);">

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>
    <div id="bottom-nav-placeholder"></div>

    <main class="container" style="padding-top: 120px; padding-bottom: 60px; max-width: 800px;">
        <div
            style="background: var(--color-white); border: 4px solid var(--color-primary); border-radius: 0; padding: 50px;">
            <div style="text-align: center; margin-bottom: 45px;">
                <h1 style="font-size: 2.8rem; margin-bottom: 12px; font-weight: 800; color: var(--color-primary);"
                    data-i18n="request_service_title">طلب خدمة جديدة
                </h1>
                <p style="color: var(--color-slate); font-weight: 800; font-size: 1.1rem;"
                    data-i18n="request_service_subtitle">اشرح لينا شنو محتاج بالظبط
                    باش الحرفيين يعطيوك عروض.</p>
            </div>

            <form id="request-service-form" class="request-form">
                <div class="input-group-row">
                    <div class="input-group" style="margin-bottom: 25px;">
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 800; color: var(--color-primary);"
                            data-i18n="service_category">نوع الخدمة</label>
                        <select name="category" required
                            style="width: 100%; padding: 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                            <option value="" disabled selected data-i18n="cat_placeholder">اختر التصنيف</option>
                            <option value="plumbing" data-i18n="cat_plumbing">رصيص (Plomberie)</option>
                            <option value="electricity" data-i18n="cat_electrician">تريسيان (Électricité)</option>
                            <option value="painting" data-i18n="cat_painter">صباغ (Peinture)</option>
                            <option value="carpentry" data-i18n="cat_carpenter">نجار (Menuiserie)</option>
                        </select>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: 800; color: var(--color-primary);"
                        data-i18n="job_description">وصف المشكل / الخدمة</label>
                    <textarea name="description" rows="5" placeholder="مثلا: عندي فويت فـالروبيني ديال الكوزينة..."
                        required
                        style="width: 100%; background: var(--color-white); border: 2px solid var(--color-primary); border-radius: 0; padding: 15px; color: var(--color-dark); font-weight: 800;"></textarea>
                </div>

                <div class="input-group-row"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px;">
                    <div class="input-group">
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 800; color: var(--color-primary);"
                            data-i18n="budget_est">الميزانية التقديرية (د.م)</label>
                        <input type="number" name="budget" placeholder="مثلا: 100" required
                            style="width: 100%; padding: 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                    </div>
                    <div class="input-group">
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 800; color: var(--color-primary);"
                            data-i18n="city_label">المدينة</label>
                        <select name="city" required
                            style="width: 100%; padding: 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                            <option value="rabat" data-i18n="city_rabat">الرباط</option>
                            <option value="marrakech" data-i18n="city_marrakech">مراكش</option>
                            <option value="tanger" data-i18n="city_tangier">طنجة</option>
                            <option value="agadir" data-i18n="city_agadir">أكادير</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label style="display: block; margin-bottom: 10px; font-weight: 800; color: var(--color-primary);"
                        data-i18n="upload_photos">صور المشكل (اختياري)</label>
                    <div class="file-upload-zone"
                        style="border: 3px dashed var(--color-primary); border-radius: 0; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--color-bg);">
                        <i class="fas fa-cloud-upload-alt"
                            style="font-size: 2.5rem; color: var(--color-primary); margin-bottom: 15px;"></i>
                        <p style="font-size: 1rem; color: var(--color-primary); font-weight: 800;">كليكي هنا باش تزيد
                            تصاور</p>
                        <input type="file" multiple style="display: none;">
                    </div>
                </div>

                <div style="margin-top: 50px;">
                    <button type="submit" class="btn btn-accent"
                        style="width: 100%; padding: 20px; border-radius: 0; border: none; background: var(--color-accent); color: white; font-weight: 800; font-size: 1.2rem;"
                        data-i18n="submit_request">نشر الطلب</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('request-service-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (typeof showToast === 'function') {
                showToast('تم نشر طلبك بنجاح! عدي يبداو يوصلوك عروض قريبا.', 'success');
            }
            setTimeout(() => {
                window.location.href = 'client-dashboard.html';
            }, 2000);
        });

        // Simple visual feedback for file upload
        const uploadZone = document.querySelector('.file-upload-zone');
        uploadZone.addEventListener('click', () => uploadZone.querySelector('input').click());
        uploadZone.querySelector('input').addEventListener('change', function () {
            if (this.files.length > 0) {
                uploadZone.querySelector('p').textContent = `تم اختيار ${this.files.length} صور`;
                uploadZone.style.borderColor = 'var(--color-success)';
            }
        });
    </script>
</body>

</html>
