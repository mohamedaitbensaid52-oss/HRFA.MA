<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hrfa.ma - إنشاء حساب حرفي</title>
    <meta name="description" content="انضم إلى شبكة الحرفيين في hrfa.ma ووسع نطاق عملك في مدينتك.">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#06141B">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="background: var(--color-bg); min-height: 100vh;">

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <div
        style="display: flex; flex: 1; align-items: center; justify-content: center; padding: 40px 20px; margin-top: 100px;">
        <div
            style="background: var(--color-white); border: 4px solid var(--color-primary); border-radius: 0; padding: 50px; width: 100%; max-width: 600px; text-align: center;">
            <i class="fas fa-screwdriver-wrench artisan-header-icon"
                style="font-size: 3rem; color: var(--color-primary); margin-bottom: 25px;"></i>
            <h2 style="margin-bottom: 35px; font-weight: 800; color: var(--color-primary); font-size: 2.2rem;"
                data-i18n="artisan_btn">تسجيل حرفي جديد</h2>

            <form id="artisan-register-form" style="text-align: start; width: 100%;">
                <div style="margin-bottom: 20px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                        data-i18n="full_name">الاسم الكامل</label>
                    <div class="input-group" style="position: relative;">
                        <i class="fas fa-user input-icon"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                        <input type="text" name="full_name" class="input-with-icon" required
                            style="width: 100%; padding: 12px 45px 12px 12px; border: 2px solid var(--color-primary); border-radius: 0; background: white; font-weight: 800; color: var(--color-dark);">
                    </div>
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div style="flex: 1;">
                        <label
                            style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                            data-i18n="profession">الحرفة</label>
                        <div class="input-group" style="position: relative;">
                            <i class="fas fa-briefcase input-icon"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                            <select name="profession" class="input-with-icon"
                                style="width: 100%; padding: 12px 45px 12px 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                                <option value="plumber" data-i18n="cat_plumbing">رصيص</option>
                                <option value="electrician" data-i18n="cat_electrician">كهربائي</option>
                                <option value="painter" data-i18n="cat_painter">صباغ</option>
                                <option value="carpenter" data-i18n="cat_carpenter">نجار</option>
                            </select>
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label
                            style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                            data-i18n="city">المدينة</label>
                        <div class="input-group" style="position: relative;">
                            <i class="fas fa-location-dot input-icon"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                            <select name="city" class="input-with-icon"
                                style="width: 100%; padding: 12px 45px 12px 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                                <option value="rabat" data-i18n="city_rabat">Rabat</option>
                                <option value="casablanca" data-i18n="city_casablanca">Casablanca</option>
                                <option value="fes" data-i18n="city_fes">Fes</option>
                                <option value="marrakech" data-i18n="city_marrakech">Marrakech</option>
                                <option value="tangier" data-i18n="city_tangier">Tangier</option>
                                <option value="sale" data-i18n="city_sale">Sale</option>
                                <option value="meknes" data-i18n="city_meknes">Meknes</option>
                                <option value="agadir" data-i18n="city_agadir">Agadir</option>
                                <option value="kenitra" data-i18n="city_kenitra">Kenitra</option>
                                <option value="oujda" data-i18n="city_oujda">Oujda</option>
                                <option value="tetouan" data-i18n="city_tetouan">Tetouan</option>
                                <option value="safi" data-i18n="city_safi">Safi</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                        data-i18n="phone_label">رقم الهاتف</label>
                    <div class="input-group" style="position: relative;">
                        <i class="fas fa-phone input-icon"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                        <input type="tel" name="phone" class="input-with-icon" required placeholder="0600000000"
                            style="width: 100%; padding: 12px 45px 12px 12px; border: 2px solid var(--color-primary); border-radius: 0; background: white; font-weight: 800; color: var(--color-dark);">
                    </div>
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 35px;">
                    <div style="flex: 1;">
                        <label
                            style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                            data-i18n="pass_label">كلمة المرور</label>
                        <div class="input-group" style="position: relative;">
                            <i class="fas fa-lock input-icon"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                            <input type="password" name="password" class="input-with-icon" required
                                style="width: 100%; padding: 12px 45px 12px 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label
                            style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                            data-i18n="confirm_pass">تأكيد كلمة المرور</label>
                        <div class="input-group" style="position: relative;">
                            <i class="fas fa-shield-halved input-icon"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                            <input type="password" class="input-with-icon" required
                                style="width: 100%; padding: 12px 45px 12px 12px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 18px; background: var(--color-accent); border: none; border-radius: 0; color: white; font-weight: 800; font-size: 1.2rem;"
                    data-i18n="register_submit">إنشاء الحساب</button>

                <div style="margin-top: 25px; text-align: center;">
                    <a href="artisan-login.html"
                        style="color: var(--color-primary); text-decoration: underline; font-size: 1rem; font-weight: 800;"
                        data-i18n="already_have_account">عندي حساب؟ تسجيل الدخول</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('artisan-register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (window.handleFormValidation && !window.handleFormValidation('artisan-register-form')) {
                if (window.showToast) window.showToast('يرجى ملء جميع الخانات المطلوبة', 'danger');
                return;
            }
            if (window.showToast) window.showToast('تم إنشاء الحساب بنجاح!', 'success');
            setTimeout(() => { window.location.href = 'artisan-dashboard.html'; }, 1500);
        });
    </script>
</body>

</html>
