<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | HRFA.MA</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">

    <!-- SEO & Open Graph -->
    <meta property="og:title" content="الملف الشخصي للحرفي | hrfa.ma">
    <meta property="og:description" content="تصفح أعمال الحرفي، صور قبل وبعد، وتقييمات الزبناء.">
    <meta property="og:type" content="profile">

    <!-- CSS Links -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-header {
            padding: 80px 0 40px;
            background: var(--color-white);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .portfolio-item {
            position: relative;
            border-radius: 0;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .portfolio-item:hover img {
            transform: scale(1.1);
        }

        .before-after-label {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--color-accent);
            padding: 4px 10px;
            border-radius: 0;
            font-size: 0.8rem;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>
    <div id="bottom-nav-placeholder"></div>

    <main class="main-content">
        <header class="profile-header"
            style="background: var(--color-white); padding: 100px 0 60px; border-bottom: 2px solid var(--color-primary);">
            <div class="container text-center">
                <div style="position: relative; display: inline-block; margin-bottom: 30px;">
                    <img id="profile-img"
                        src="https://ui-avatars.com/api/?name=Said+Painter&size=150&background=1E3A8A&color=fff"
                        style="width: 150px; height: 150px; border-radius: 0; border: 4px solid var(--color-primary);"
                        alt="Artisan">
                    <div
                        style="position: absolute; bottom: -10px; right: -10px; width: 40px; height: 40px; background: var(--color-primary); border: none; display: flex; align-items: center; justify-content: center; color: var(--color-bg); font-size: 1.2rem;">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
                <h1 id="profile-name"
                    style="font-size: 2.8rem; margin-bottom: 10px; font-weight: 800; color: var(--color-primary);">سعيد
                    الصباغ</h1>
                <p id="profile-specialty" class="text-silver"
                    style="font-size: 1.3rem; margin-bottom: 35px; color: var(--color-slate); font-weight: 800;">خبير
                    صباغة
                    وديكور</p>

                <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                    <button class="btn btn-primary" id="chat-btn"
                        style="padding: 15px 45px; font-size: 1.1rem; border-radius: 0; background: var(--color-accent); font-weight: 800;">
                        <i class="fas fa-comment-dots" style="margin-inline-end: 10px;"></i> <span
                            data-i18n="chat_btn">تراسل</span>
                    </button>
                    <button class="btn btn-outline"
                        style="padding: 15px 45px; font-size: 1.1rem; border-radius: 0; border: 2px solid var(--color-primary); color: var(--color-primary); font-weight: 800;"
                        onclick="window.location.href='404.html'">
                        <i class="fas fa-phone" style="margin-inline-end: 10px;"></i> اتصل الآن
                    </button>
                </div>
            </div>
        </header>

        <div class="container" style="padding: 60px 0;">
            <!-- Portfolio Section (Flat Grid) -->
            <section style="margin-bottom: 60px;">
                <h2 class="quick-categories-title" data-i18n="portfolio_title"
                    style="color: var(--color-primary); margin-bottom: 30px; font-weight: 800;">
                    <i class="fas fa-images"></i>
                    مشاريع سابقة (قبل وبعد)
                </h2>
                <div class="portfolio-grid" style="grid-template-columns: repeat(3, 1fr); gap: 15px;">
                    <div class="portfolio-item"
                        style="aspect-ratio: 1/1; border: 2px solid var(--color-primary); position: relative;">
                        <img src="https://images.unsplash.com/photo-1562259949-e8e7689d7828?auto=format&fit=crop&w=400"
                            alt="Work 1" style="width: 100%; height: 100%; object-fit: cover;">
                        <span class="before-after-label"
                            style="background: var(--color-primary); border-radius: 0; font-weight: 800; top: 10px; right: 10px;">بعد</span>
                    </div>
                    <div class="portfolio-item"
                        style="aspect-ratio: 1/1; border: 2px solid var(--color-primary); position: relative;">
                        <img src="https://images.unsplash.com/photo-1589939705384-5185138a04b9?auto=format&fit=crop&w=400"
                            alt="Work 2" style="width: 100%; height: 100%; object-fit: cover;">
                        <span class="before-after-label"
                            style="background: var(--color-accent); border-radius: 0; font-weight: 800; top: 10px; right: 10px;">قبل</span>
                    </div>
                    <div class="portfolio-item"
                        style="aspect-ratio: 1/1; border: 2px solid var(--color-primary); position: relative;">
                        <img src="https://images.unsplash.com/photo-1595844730298-b9f1ff41fb91?auto=format&fit=crop&w=400"
                            alt="Work 3" style="width: 100%; height: 100%; object-fit: cover;">
                        <span class="before-after-label"
                            style="background: var(--color-primary); border-radius: 0; font-weight: 800; top: 10px; right: 10px;">بعد</span>
                    </div>
                </div>
            </section>

            <!-- Reviews Section -->
            <section>
                <h2 class="quick-categories-title" data-i18n="reviews_title"
                    style="color: var(--color-primary); margin-bottom: 30px; font-weight: 800;">
                    <i class="fas fa-comment-dots"></i>
                    تقييمات الزبناء
                </h2>
                <div class="activity-list">
                    <div
                        style="padding: 25px; margin-bottom: 15px; background: var(--color-white); border: 2px solid var(--color-primary); text-align: right;">
                        <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px;">
                            <strong style="color: var(--color-primary); font-weight: 800;">ياسين . ع</strong>
                            <div class="rating-keywords" style="display: flex; gap: 8px;">
                                <span
                                    style="border: 2px solid var(--color-primary); color: var(--color-primary); padding: 4px 12px; font-size: 0.8rem; font-weight: 800;">معقول</span>
                                <span
                                    style="background: rgba(var(--color-primary-rgb), 0.1); color: var(--color-primary); padding: 4px 12px; border-radius: 0; font-size: 0.8rem; font-weight: 800;">كيجي
                                    في الوقت</span>
                            </div>
                        </div>
                        <p class="text-silver" style="color: var(--color-slate); font-size: 1rem; line-height: 1.6;">
                            خدمة ممتازة، التزام بالوقت دقة ف الخدمة. تبارك الله عليك أسي سعيد.</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Show skeletons for portfolio
            if (window.showSkeleton) {
                window.showSkeleton('portfolio-grid', 'card', 2);
            }
            const params = new URLSearchParams(window.location.search);
            const artisanId = params.get('id');

            const mockArtisans = {
                1: { name: 'سعيد الصباغ', specialty: 'خبير صباغة وديكور', initials: 'SP', color: '00D1B2', portfolio: ['562259949-e8e7689d7828', '589939705384-5185138a04b9', '595844730298-b9f1ff41fb91'], review: 'خدمة ممتازة، التزام بالوقت دقة ف الخدمة. تبارك الله عليك أسي سعيد.' },
                2: { name: 'أمين التريسيان', specialty: 'تريسيان محترف', initials: 'AE', color: 'fbbf24', portfolio: ['1621360446820-29000a6a4f72', '1558210850-21a00c639953', '1591405351990-eb834769a37c'], review: 'خدمة نقية بزاف، أمين تريسيان متمكن وعارف شغلو. شكراً لك.' },
                3: { name: 'فاطمة النظافة', specialty: 'خبير تنظيف منازل', initials: 'FC', color: 'ff4757', portfolio: ['1581578736253-ab3d405f6d8c', '1527515637462-c903261a84c3', '15846226500cc-114d42020295'], review: 'فاطمة مخلات لينا الدار كتشعل، دقة في المواعيد و أمانة كبيرة.' },
                4: { name: 'ياسين الرصايص', specialty: 'رصايص (Plombier)', initials: 'YP', color: '38bdf8', portfolio: ['1504281627-7472049e59d3', '1542013829-51dd33843f25', '1585213235281-90a604240409'], review: 'ياسين رصايص فالمستوى، جا في الوقت حل ليا المشكل ديال التسرب دغيا.' },
                5: { name: 'حسن النجار', specialty: 'نجار عصري', initials: 'HW', color: 'a855f7', portfolio: ['1538627658010-0fc293043209', '1538627485203-0fc293043209', '1538627581903-0fc293043209'], review: 'حسن نجار فنان، صاوب ليا بلاكار موديرن كما بغيت. الله يعطيك الصحة.' },
                6: { name: 'كريم الزليجي', specialty: 'معلم زليج وتارازو', initials: 'KT', color: 'ea580c', portfolio: ['1505373858-69df5154077c', '1584144491-9e266914ed0b', '1502444594-8164360a0f44'], review: 'كريم كيتقن الزليج، الدار ولات غزالة بفضل لمستو. برافو عليك.' }
            };

            if (artisanId && mockArtisans[artisanId]) {
                const artisan = mockArtisans[artisanId];
                document.getElementById('profile-name').textContent = artisan.name;
                document.getElementById('profile-specialty').textContent = artisan.specialty;

                const profileImg = document.getElementById('profile-img');
                profileImg.src = `https://ui-avatars.com/api/?name=${artisan.initials}&background=${artisan.color}&color=fff&size=150`;

                // Update Review
                const reviewText = document.querySelector('.activity-list p');
                if (reviewText) reviewText.textContent = artisan.review;

                // Update Portfolio Images
                const portfolioImgs = document.querySelectorAll('.portfolio-item img');
                if (portfolioImgs.length === 3) {
                    portfolioImgs[0].src = `https://images.unsplash.com/photo-${artisan.portfolio[0]}?auto=format&fit=crop&w=400`;
                    portfolioImgs[1].src = `https://images.unsplash.com/photo-${artisan.portfolio[1]}?auto=format&fit=crop&w=400`;
                    portfolioImgs[2].src = `https://images.unsplash.com/photo-${artisan.portfolio[2]}?auto=format&fit=crop&w=400`;
                }

                document.title = `${artisan.name} | hrfa.ma`;

                // Handle Chat Button
                const chatBtn = document.getElementById('chat-btn');
                if (chatBtn) {
                    chatBtn.onclick = () => {
                        window.location.href = `chat.html?id=${artisanId}`;
                    };
                }
            }
        });
    </script>

</body>

</html>
