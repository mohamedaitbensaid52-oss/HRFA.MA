<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | HRFA.MA</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-page-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 20px;
        }

        .error-card {
            background: var(--color-white);
            border: 4px solid var(--color-primary);
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            overflow: hidden;
            position: relative;
        }

        .error-visual {
            background: var(--color-primary);
            color: var(--color-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .error-visual i {
            font-size: 8rem;
            color: var(--color-accent);
            animation: bounce 2s infinite ease-in-out;
        }

        .error-visual .big-text {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            margin-top: 20px;
            opacity: 0.1;
            position: absolute;
            bottom: -20px;
            left: 10px;
        }

        .error-content {
            padding: 60px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .error-content h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--color-primary);
            margin-bottom: 15px;
        }

        .error-content p {
            font-size: 1.1rem;
            color: var(--color-slate);
            margin-bottom: 35px;
            font-weight: 800;
        }

        .error-search {
            margin-bottom: 40px;
        }

        .error-search .input-group {
            display: flex;
            border: 2px solid var(--color-primary);
        }

        .error-search input {
            flex: 1;
            padding: 15px;
            border: none;
            font-weight: 800;
            outline: none;
            color: var(--color-dark);
        }

        .error-search button {
            background: var(--color-primary);
            color: var(--color-bg);
            border: none;
            padding: 0 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        .error-search button:hover {
            background: var(--color-accent);
        }

        .quick-links {
            display: flex;
            gap: 15px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @media (max-width: 768px) {
            .error-card {
                grid-template-columns: 1fr;
            }

            .error-visual {
                padding: 40px;
            }

            .error-visual i {
                font-size: 5rem;
            }

            .error-content {
                padding: 40px 20px;
                text-align: center;
            }

            .quick-links {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="error-page-container">
        <div class="error-card fade-in">
            <div class="error-visual">
                <i class="fas fa-screwdriver-wrench"></i>
                <div class="big-text">404</div>
            </div>
            <div class="error-content">
                <h2 data-i18n="error_404_title">فين مشيتي؟</h2>
                <p data-i18n="error_404_desc">هاد الصفحة اللي كتقلب عليها ماكايناش، يمكن الرابط غلط ولا تمسحات من السيت.
                </p>

                <div class="error-search">
                    <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--color-primary);"
                        data-i18n="search_artisan_now">قلب على حرفي دابا:
                    </p>
                    <div class="input-group">
                        <input type="text" id="error-search-input" placeholder="مثلا: بلومبي، تريسيان..."
                            data-i18n-placeholder="search_placeholder">
                        <button onclick="handleSearch()"><i class="fas fa-search"></i></button>
                    </div>
                </div>

                <div class="quick-links">
                    <a href="../index.html" class="btn btn-primary" style="flex: 1; border-radius: 0; padding: 15px;">
                        <i class="fas fa-home"></i> <span data-i18n="home_btn">الرئيسية</span>
                    </a>
                    <a href="contact.html" class="btn btn-outline"
                        style="flex: 1; border-radius: 0; border: 2px solid var(--color-primary); font-weight: 800; padding: 15px;">
                        <i class="fas fa-envelope"></i> <span data-i18n="nav_contact">اتصل بنا</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initI18n === 'function') {
                initI18n(localStorage.getItem('HRFA_LANG') || 'ar');
            }
        });

        function handleSearch() {
            const query = document.getElementById('error-search-input').value;
            if (query) {
                window.location.href = `search-results.html?q=${encodeURIComponent(query)}`;
            }
        }
    </script>
</body>

</html>
