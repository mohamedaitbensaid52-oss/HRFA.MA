<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hrfa.ma - تسجيل دخول الزبون</title>
    <meta name="description" content="سجل دخولك كزبون في hrfa.ma وابحث عن أفضل الحرفيين المهنيين في منطقتك بكل سهولة.">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#06141B">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body style="background: var(--color-bg); min-height: 100vh;">

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <div
        style="display: flex; flex: 1; align-items: center; justify-content: center; padding: 40px 20px; margin-top: 100px;">
        <div
            style="background: var(--color-white); border: 4px solid var(--color-primary); border-radius: 0; padding: 50px; width: 100%; max-width: 480px; text-align: center;">
            <i class="fas fa-circle-user client-header-icon"
                style="font-size: 3rem; color: var(--color-primary); margin-bottom: 25px;"></i>
            <h2 style="margin-bottom: 12px; font-weight: 800; color: var(--color-primary); font-size: 2.2rem;"
                data-i18n="client_btn">دخول الزبناء</h2>
            <p style="margin-bottom: 40px; font-size: 1.1rem; color: var(--color-slate); font-weight: 800;"
                data-i18n="client_desc">مرحباً بك مجدداً فعالم "حرفة"</p>
            <form id="client-login-form" style="text-align: start; width: 100%;">
                <div style="margin-bottom: 25px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                        data-i18n="email_label">البريد الإلكتروني</label>
                    <div class="input-group" style="position: relative;">
                        <i class="fas fa-envelope input-icon"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                        <input type="email" name="email" class="input-with-icon" required
                            style="width: 100%; padding: 15px 45px 15px 15px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                    </div>
                </div>
                <div style="margin-bottom: 35px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-size: 1rem; color: var(--color-primary); font-weight: 800;"
                        data-i18n="pass_label">كلمة المرور</label>
                    <div class="input-group" style="position: relative;">
                        <i class="fas fa-lock input-icon"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--color-primary);"></i>
                        <input type="password" name="password" class="input-with-icon" required
                            style="width: 100%; padding: 15px 45px 15px 15px; border: 2px solid var(--color-primary); border-radius: 0; background: var(--color-white); font-weight: 800; color: var(--color-dark);">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 18px; background: var(--color-accent); border: none; border-radius: 0; color: white; font-weight: 800; font-size: 1.2rem;"
                    data-i18n="login_submit">دخول</button>
                <div style="margin-top: 25px; text-align: center;">
                    <a href="client-register.html"
                        style="color: var(--color-primary); text-decoration: underline; font-size: 1rem; font-weight: 800;"
                        data-i18n="register_link">انشاء حساب جديد</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById('client-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (window.handleFormValidation && !window.handleFormValidation('client-login-form')) {
                if (window.showToast) window.showToast('يرجى ملء جميع الخانات المطلوبة', 'danger');
                return;
            }
            if (window.showToast) window.showToast('تم تسجيل الدخول بنجاح!', 'success');
            setTimeout(() => { window.location.href = 'client-dashboard.html'; }, 1500);
        });
    </script>
</body>

</html>
